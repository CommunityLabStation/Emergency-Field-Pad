<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Space Weather Journal (Locked)</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #050814;
      color: #e5e7eb;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .dash-shell {
      max-width: 960px;
      width: 100%;
      padding: 24px;
    }

    .dash-header {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 16px;
    }

    .dash-title {
      font-size: 1.4rem;
      font-weight: 600;
    }

    .dash-subtitle {
      font-size: 0.9rem;
      color: #9ca3af;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.1);
      color: #22c55e;
      font-size: 0.8rem;
      margin-top: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1.8fr);
      gap: 16px;
      margin-top: 16px;
    }

    .card {
      background: rgba(15, 23, 42, 0.9);
      border-radius: 12px;
      padding: 14px 16px;
      border: 1px solid rgba(148, 163, 184, 0.25);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 500;
    }

    .card-meta {
      font-size: 0.8rem;
      color: #9ca3af;
    }

    .kp-value {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .kp-label {
      font-size: 0.8rem;
      color: #9ca3af;
      margin-top: 4px;
    }

    .journal-list {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 420px;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    .journal-item {
      padding: 8px 0;
      border-bottom: 1px solid rgba(55, 65, 81, 0.6);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .journal-item:last-child {
      border-bottom: none;
    }

    .journal-event {
      font-size: 0.9rem;
    }

    .journal-time {
      font-size: 0.75rem;
      color: #9ca3af;
    }

    .journal-tag {
      font-size: 0.75rem;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(248, 250, 252, 0.03);
      border: 1px solid rgba(148, 163, 184, 0.4);
      margin-top: 4px;
    }

    .journal-tag.alert {
      border-color: #f97316;
      color: #fed7aa;
    }

    .journal-tag.alert::before {
      content: "⚠️";
    }

    /* No clear/export buttons: journal is view-only */
    .journal-controls {
      display: none;
    }
  </style>
</head>
<body>
  <div class="dash-shell">
    <header class="dash-header">
      <div class="dash-title">Domes & Dashboards · Space Weather Ambient Installation</div>
      <div class="dash-subtitle">NASA DONKI + NOAA SWPC • Real-Time Civic Ambient Data Art</div>
      <div class="status-pill">
        <span>☀️ Sun is calm</span>
      </div>
    </header>

    <div class="grid">
      <!-- Left: Current Kp / summary -->
      <section class="card">
        <div class="card-header">
          <div class="card-title">Geomagnetic Field (Kp Index)</div>
          <div class="card-meta">Real-time ambient reading</div>
        </div>
        <div class="kp-value" id="kpValue">0</div>
        <div class="kp-label" id="kpLabel">Quiet geomagnetic field</div>
      </section>

      <!-- Right: Journal feed (locked) -->
      <section class="card">
        <div class="card-header">
          <div class="card-title">Space Weather Journal</div>
          <div class="card-meta">View-only feed · Export/Clear disabled</div>
        </div>

        <!-- Hidden controls: kept out of DOM or display:none -->
        <div class="journal-controls">
          <!-- Intentionally empty: no clear/export buttons -->
        </div>

        <ul class="journal-list" id="journalList"></ul>
      </section>
    </div>
  </div>

  <script>
    // Example: static journal data mirroring your current feed
    const journalEntries = [
      { event: "Kp Index changed to 0", time: "7/16/2026, 8:36:16 PM" },
      { event: "Kp Index changed to 1", time: "7/14/2026, 2:14:31 PM" },
      { event: "Kp Index changed to 1", time: "7/14/2026, 1:46:38 PM" },
      { event: "Solar flare detected: C6.1", time: "7/6/2026, 8:00:55 AM" },
      { event: "Kp Index changed to 1", time: "7/6/2026, 8:00:54 AM" },
      { event: "Kp Index changed to 3", time: "7/3/2026, 5:36:51 PM" },
      { event: "M-Class Solar Flare", time: "7/3/2026, 5:21:34 PM", alert: true },
      { event: "Solar flare detected: M1.5", time: "7/3/2026, 5:21:34 PM", alert: true },
      { event: "Kp Index changed to 3", time: "7/3/2026, 5:21:33 PM" },
      { event: "Kp Index changed to 0", time: "6/24/2026, 10:08:32 PM" },
      { event: "Kp Index changed to 0", time: "6/24/2026, 10:08:27 PM" },
      { event: "Kp Index changed to 0", time: "6/24/2026, 10:08:22 PM" },
      { event: "Kp Index changed to 0", time: "6/24/2026, 10:08:16 PM" },
      { event: "Kp Index changed to 0", time: "6/24/2026, 10:08:08 PM" },
      { event: "Kp Index changed to 0", time: "6/24/2026, 10:07:53 PM" },
      { event: "Kp Index changed to 0", time: "6/24/2026, 10:07:48 PM" },
      { event: "Kp Index changed to 0", time: "6/24/2026, 10:07:42 PM" },
      { event: "Kp Index changed to 0", time: "6/24/2026, 10:07:36 PM" },
      { event: "Kp Index changed to 0", time: "6/24/2026, 10:07:32 PM" },
      { event: "Kp Index changed to 4", time: "6/24/2026, 9:59:03 PM", alert: true },
      { event: "Active Geomagnetic Field (Kp 4)", time: "6/24/2026, 9:59:03 PM", alert: true },
      { event: "Kp Index changed to 4", time: "6/24/2026, 9:58:47 PM", alert: true },
      { event: "Active Geomagnetic Field (Kp 4)", time: "6/24/2026, 9:58:47 PM", alert: true },
      { event: "Kp Index changed to 4", time: "6/24/2026, 9:45:33 PM", alert: true },
      { event: "Active Geomagnetic Field (Kp 4)", time: "6/24/2026, 9:45:33 PM", alert: true },
      { event: "Kp Index changed to 5", time: "6/24/2026, 9:35:33 PM", alert: true },
      { event: "Active Geomagnetic Field (Kp 5)", time: "6/24/2026, 9:35:33 PM", alert: true },
      { event: "Kp Index changed to 4", time: "6/24/2026, 9:25:33 PM", alert: true },
      { event: "Active Geomagnetic Field (Kp 4)", time: "6/24/2026, 9:25:32 PM", alert: true },
      { event: "Kp Index changed to 4", time: "6/24/2026, 9:00:35 PM", alert: true },
      { event: "Active Geomagnetic Field (Kp 4)", time: "6/24/2026, 9:00:35 PM", alert: true }
    ];

    function renderJournal() {
      const list = document.getElementById("journalList");
      list.innerHTML = "";

      journalEntries.forEach(entry => {
        const li = document.createElement("li");
        li.className = "journal-item";

        const event = document.createElement("div");
        event.className = "journal-event";
        event.textContent = entry.event;

        const time = document.createElement("div");
        time.className = "journal-time";
        time.textContent = entry.time;

        li.appendChild(event);
        li.appendChild(time);

        if (entry.alert) {
          const tag = document.createElement("div");
          tag.className = "journal-tag alert";
          tag.textContent = "Active / Flare Event";
          li.appendChild(tag);
        }

        list.appendChild(li);
      });
    }

    // Example: set current Kp from latest entry that mentions "Kp Index changed"
    function updateKpFromJournal() {
      const latestKpEntry = journalEntries
        .slice()
        .reverse()
        .find(e => e.event.startsWith("Kp Index changed"));

      if (!latestKpEntry) return;

      const match = latestKpEntry.event.match(/Kp Index changed to (\\d+)/);
      if (!match) return;

      const kp = Number(match[1]);
      const kpValueEl = document.getElementById("kpValue");
      const kpLabelEl = document.getElementById("kpLabel");

      kpValueEl.textContent = kp;

      let label = "Quiet geomagnetic field";
      if (kp >= 4 && kp <= 5) label = "Active geomagnetic field";
      if (kp >= 6) label = "Storm-level geomagnetic activity";

      kpLabelEl.textContent = label;
    }

    // Initialize
    renderJournal();
    updateKpFromJournal();
  </script>
</body>
</html>
